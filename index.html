<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artur Linnik</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --fg: #111110;
      --muted: #888884;
      --border: #d8d8d4;
      --accent: #111110;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e0d;
        --fg: #f0f0ee;
        --muted: #777773;
        --border: #2a2a28;
        --accent: #f0f0ee;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist Mono', monospace;
      overflow: hidden;
    }

    /* ── canvas for the field animation ── */
    #field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      animation: fadeField 1.8s 0.4s ease forwards;
    }
    @keyframes fadeField { to { opacity: 1; } }

    /* ── centre card ── */
    .card {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
      text-align: center;
    }

    .greeting {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.9s 0.7s cubic-bezier(.22,1,.36,1) forwards;
    }

    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--fg);
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1s 1s cubic-bezier(.22,1,.36,1) forwards;
      margin-top: 0.35em;
    }

    .name em {
      font-style: italic;
      font-weight: 300;
    }

    .rule {
      width: 0;
      height: 1px;
      background: var(--border);
      margin: 2rem auto;
      animation: expandRule 1s 1.6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes expandRule { to { width: min(240px, 40vw); } }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      animation: rise 0.9s 2s cubic-bezier(.22,1,.36,1) forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5em;
      padding: 0.65em 1.5em;
      font-family: 'Geist Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--fg);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.28s cubic-bezier(.22,1,.36,1);
      z-index: 0;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: var(--bg); border-color: var(--accent); }
    .btn:hover .btn-icon { stroke: var(--bg); }
    .btn:active { transform: scale(0.97); }

    .btn span, .btn-icon { position: relative; z-index: 1; }

    .btn-icon {
      width: 12px;
      height: 12px;
      stroke: var(--fg);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }

    .footer {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      margin-top: 1.6rem;
      animation: rise 0.8s 2.4s ease forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="field"></canvas>

  <div class="card">
    <p class="greeting">Hello, world —</p>
    <h1 class="name">Artur Linnik</h1>
    <div class="rule"></div>
    <div class="actions">
      <a class="btn" href="mailto:ar2r.world@gmail.com">
        <svg class="btn-icon" viewBox="0 0 16 16">
          <path d="M1 4l7 5 7-5M1 4h14v9H1z"/>
        </svg>
        <span>Contact</span>
      </a>
      <a class="btn" href="./ArturLinnikTA0326.pdf" target="_blank" rel="noopener">
        <svg class="btn-icon" viewBox="0 0 16 16">
          <path d="M4 1h6l4 4v10H2V1zM10 1v4h4"/>
          <path d="M5 9h6M5 12h4"/>
        </svg>
        <span>Résumé</span>
      </a>
    </div>
    <p class="footer">Software developer</p>
  </div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    // ── flowing dot-field animation ──────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('field');
      const ctx = canvas.getContext('2d');

      // detect theme
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const DOT_COLOR = dark ? 'rgba(240,240,238,' : 'rgba(17,17,16,';

      let W, H, dots;
      const COUNT = 80;
      const MAX_DIST = 120;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function makeDot() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.35,
          vy: (Math.random() - 0.5) * 0.35,
          r: Math.random() * 1.4 + 0.4,
        };
      }

      function init() {
        resize();
        dots = Array.from({ length: COUNT }, makeDot);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // update + wrap
        for (const d of dots) {
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < -10) d.x = W + 10;
          else if (d.x > W + 10) d.x = -10;
          if (d.y < -10) d.y = H + 10;
          else if (d.y > H + 10) d.y = -10;
        }

        // edges
        for (let i = 0; i < dots.length; i++) {
          for (let j = i + 1; j < dots.length; j++) {
            const dx = dots[i].x - dots[j].x;
            const dy = dots[i].y - dots[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX_DIST) {
              const alpha = (1 - dist / MAX_DIST) * (dark ? 0.18 : 0.38);
              ctx.beginPath();
              ctx.moveTo(dots[i].x, dots[i].y);
              ctx.lineTo(dots[j].x, dots[j].y);
              ctx.strokeStyle = DOT_COLOR + alpha + ')';
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }

        // dots
        for (const d of dots) {
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = DOT_COLOR + (dark ? '0.35' : '0.65') + ')';
          ctx.fill();
        }
requestAnimationFrame(draw);
      }
 
      window.addEventListener('resize', () => { resize(); });
      init();
      draw();
    })();
  </script>
</body>
</html>
